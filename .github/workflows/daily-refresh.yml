name: GSO Dashboard Daily Refresh

on:
  schedule:
    # 10:00 UTC = 6:00 AM Eastern (EDT, UTC-4)
    - cron: '0 10 * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  refresh-dashboard:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Goose refresh
        env:
          TZ: America/Indiana/Indianapolis
          HOME: /Users/mhofer
          PATH: /Applications/Goose.app/Contents/Resources/bin:/Users/mhofer/.config/goose/bin:/usr/local/bin:/opt/homebrew/bin:/usr/bin:/bin:/usr/sbin:/sbin
        shell: bash
        run: |
          echo "🔄 Starting GSO Dashboard refresh at $(date)"
          echo "Working directory: $(pwd)"
          
          # Run goose with only the extensions we need
          goose run \
            --no-session \
            --with-extension "/Users/mhofer/.config/goose/bin/uvx-wrapper mcp_block_data@latest" \
            --with-extension "/Users/mhofer/.config/goose/bin/uvx-wrapper mcp_blockcell@latest" \
            --with-builtin developer \
            --no-profile \
            --instructions "${{ github.workspace }}/.github/refresh-instructions.md"
          
          echo "✅ Goose refresh completed"

      - name: Commit and push updated dashboard
        run: |
          git config user.name "GSO Dashboard Bot"
          git config user.email "gso-dashboard-bot@block.xyz"
          
          if git diff --quiet index.html; then
            echo "ℹ️ No data changes detected"
          else
            REFRESH_DATE=$(TZ='America/Indiana/Indianapolis' date '+%Y-%m-%d %I:%M %p %Z')
            git add index.html
            git add .github/latest-data.json || true
            git commit -m "🔄 Daily refresh: ${REFRESH_DATE}"
            git push
            echo "✅ Changes committed and pushed"
          fi

      - name: Summary
        if: always()
        run: |
          echo "## 📊 GSO Dashboard Refresh" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(TZ='America/Indiana/Indianapolis' date '+%Y-%m-%d %I:%M %p %Z')" >> $GITHUB_STEP_SUMMARY
          echo "- **Dashboard:** https://blockcell.sqprod.co/sites/gso-dashboard/" >> $GITHUB_STEP_SUMMARY
          echo "- **Source:** Looker Dashboard 39532" >> $GITHUB_STEP_SUMMARY
