name: GSO Dashboard Daily Refresh

on:
  schedule:
    # 10:00 UTC = 6:00 AM Eastern (EDT, UTC-4)
    - cron: '0 10 * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  refresh-dashboard:
    runs-on: self-hosted
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pre-warm MCP packages
        env:
          HOME: /Users/mhofer
          PATH: /Applications/Goose.app/Contents/Resources/bin:/Users/mhofer/.config/goose/bin:/usr/local/bin:/opt/homebrew/bin:/usr/bin:/bin
          GOOSE_UV_REGISTRY: https://global.block-artifacts.com/artifactory/api/pypi/block-pypi/simple/
        run: |
          echo "📦 Pre-warming MCP packages..."
          /Users/mhofer/.config/goose/bin/uvx-wrapper mcp_block_data@latest --help > /dev/null 2>&1 || true
          /Users/mhofer/.config/goose/bin/uvx-wrapper mcp_blockcell@latest --help > /dev/null 2>&1 || true
          echo "✓ Packages cached"

      - name: Pull fresh data from Looker
        env:
          TZ: America/Indiana/Indianapolis
          HOME: /Users/mhofer
          PATH: /Applications/Goose.app/Contents/Resources/bin:/Users/mhofer/.config/goose/bin:/usr/local/bin:/opt/homebrew/bin:/usr/bin:/bin
        run: |
          echo "🔄 Starting GSO Dashboard refresh at $(date)"
          python3 "${{ github.workspace }}/.github/refresh.py"

      - name: Update dashboard HTML with fresh data
        env:
          HOME: /Users/mhofer
          PATH: /Applications/Goose.app/Contents/Resources/bin:/Users/mhofer/.config/goose/bin:/usr/local/bin:/opt/homebrew/bin:/usr/bin:/bin
        run: |
          # If we got fresh data, use goose to update the HTML
          if [ -f "${{ github.workspace }}/.github/latest-data.json" ]; then
            DATA_SIZE=$(wc -c < "${{ github.workspace }}/.github/latest-data.json")
            echo "📊 Fresh data available: ${DATA_SIZE} bytes"
            
            if [ "$DATA_SIZE" -gt 1000 ]; then
              echo "📝 Updating dashboard HTML..."
              goose run \
                --no-session \
                --with-builtin developer \
                --no-profile \
                --text "Read the file ${{ github.workspace }}/.github/latest-data.json which contains fresh Looker dashboard data. Update ONLY the GSO_DATA JavaScript object in ${{ github.workspace }}/index.html with the new numbers. Keep all HTML structure, CSS, and chart configs unchanged. Only update data values. Be fast, do not explain."
              echo "✅ HTML updated"
            else
              echo "⚠️ Data file too small, skipping HTML update"
            fi
          else
            echo "⚠️ No data file found"
          fi

      - name: Commit and push
        run: |
          git config user.name "GSO Dashboard Bot"
          git config user.email "gso-dashboard-bot@block.xyz"
          
          if git diff --quiet; then
            echo "ℹ️ No changes detected"
          else
            REFRESH_DATE=$(TZ='America/Indiana/Indianapolis' date '+%Y-%m-%d %I:%M %p %Z')
            git add -A
            git commit -m "🔄 Daily refresh: ${REFRESH_DATE}"
            git push
            echo "✅ Changes committed and pushed"
          fi

      - name: Summary
        if: always()
        run: |
          echo "## 📊 GSO Dashboard Refresh" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(TZ='America/Indiana/Indianapolis' date '+%Y-%m-%d %I:%M %p %Z')" >> $GITHUB_STEP_SUMMARY
          echo "- **Dashboard:** https://blockcell.sqprod.co/sites/gso-dashboard/" >> $GITHUB_STEP_SUMMARY
          echo "- **Source:** Looker Dashboard 39532" >> $GITHUB_STEP_SUMMARY
