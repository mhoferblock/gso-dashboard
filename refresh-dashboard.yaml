  ═══════════════════════════════════════════════════════════
  STEP 7: Embed all data (with validation)
  ═══════════════════════════════════════════════════════════

  ```bash
  cd /Users/mhofer/gso-dashboard
  python3 refresh_all.py
  ```

  This script will:
  1. Create a backup of dashboard.html
  2. Extract current metrics from the embedded data
  3. Apply channel tagging (BPO, Vendor Ops) to dsr_facts.json
  4. Embed all JSON files into dashboard.html
  5. Compare before/after metrics — ABORT if thresholds exceeded
  6. Validate dashboard structure (script tags, data blocks, file size)
  7. Update the "Last refreshed" date in the footer

  **If the script aborts**, it will restore from backup automatically.
  **If you need to force**, run: python3 refresh_all.py --force
  Only use --force if you understand why the metrics shifted and it's expected.

  ═══════════════════════════════════════════════════════════
  STEP 8: Post-embed verification
  ═══════════════════════════════════════════════════════════

  BEFORE deploying, verify these numbers from the script output:
  - BPO records > 0 (should be ~3,000+)
  - Vendor Ops records > 0 (should be ~2,300+)
  - Pipeline (roster) is reasonable (~800-1,200)
  - Created this month > 0
  - Completed this month > 0
  - No validation errors

  If anything looks wrong, STOP and investigate. Do NOT deploy broken data.

  ═══════════════════════════════════════════════════════════
  STEP 9: Deploy to Blockcell
  ═══════════════════════════════════════════════════════════

  Create a clean deploy directory and upload (avoids uploading large JSON files):
  ```bash
  mkdir -p /tmp/gso-deploy
  cp /Users/mhofer/gso-dashboard/dashboard.html /tmp/gso-deploy/
  cp /Users/mhofer/gso-dashboard/index.html /tmp/gso-deploy/
  ```
  - Use Blockcell manageSite tool: action=upload, site_name=gso-dashboard, directory_path=/tmp/gso-deploy
  - Verify with list_versions that the new version is current
  - Report the version ID
  - Clean up: rm -rf /tmp/gso-deploy

  ═══════════════════════════════════════════════════════════
  STEP 10: Git commit and push
  ═══════════════════════════════════════════════════════════

  ```bash
  cd /Users/mhofer/gso-dashboard
  git add dashboard.html dsr_facts.json dsr_facts_slim.json refresh_all.py
  git commit -m "Refresh dashboard data — $(date +%Y-%m-%d)"
  git push
  ```

