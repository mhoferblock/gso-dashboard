version: "2.0.0"
title: "Refresh GSO Dashboard"
description: "Incremental refresh — pulls only changed records, merges with local cache, validates, embeds, and deploys."
instructions: |
  You are refreshing the GSO Dashboard. Work in /Users/mhofer/gso-dashboard (the local working copy).
  The main file is **dashboard.html** (NOT index.html — that's just a redirect stub).

  ## CRITICAL RULES — READ BEFORE DOING ANYTHING
  1. **NEVER deploy without validating numbers.** After embedding, check key KPIs match expected ranges.
  2. **Channel tagging is mandatory.** refresh_all.py handles this automatically. NEVER bypass it.
  3. **Compare before/after.** refresh_all.py does this. If it aborts, DO NOT use --force without Matt's approval.
  4. **Draft DSRs are excluded** from all active metrics (category = 'draft'). Don't count them.
  5. **Rejected DSRs** go to Cancelled tab only. They are NOT "projects worked."
  6. **Pipeline = roster reps only.** Departed reps' active/onHold DSRs are zombies — excluded from pipeline.
  7. Set Snowflake row limit to at least 50000 before running queries.
  8. If ANYTHING fails after modifying dashboard.html, restore from backup immediately.

  ## Data Architecture
  - **dashboard.html** — single-file SPA (~14MB) with all data embedded as GSO_DATA.xxx = {...};
  - **Airtable** base appsnfWWzptN9cwD0 — persistent data store (7 tables):
    - DSR Facts (tblqfqKMvmdufvRjD) — ~40,680 records, 33 fields
    - Team Roster (tbl0I2oNZdYPlJ5EH)
    - Goaling (tblB0NwaUmNv19B4c)
    - Sync Log (tbl4lnLHEmNyqpCjc)
    - Partner DSAs (tblASw9K5OMq36YT4) — partner dispatch activities
    - Vendor Spend (tblgVXWTVTO9u1WxX) — 929 invoices
    - BPO Activities (tbl2jhvPGsV6Akdgv) — BPO team work items
  - **Snowflake** — source of truth for DSR, DSA, and BPO Activity records
  - **GetFeedback** — CSAT survey responses
  - **refresh_all.py** — embed script with data shape validation, channel tagging, format transforms, and before/after comparison

  ## EXPECTED DATA SHAPES (dashboard.html contract)
  These are the formats dashboard.html expects. Getting them wrong = JS crash = stuck at pin screen.

  | Variable | Type | Example |
  |---|---|---|
  | dsrFacts | flat array | [{i, r, st, ch, cd, ...}] |
  | dsaRecords | **flat array** (NOT a wrapper dict!) | [{p, sl, at, st, dr, cd}] |
  | bpoActivities | flat array | [{at, ow, cd, n, ...}] |
  | csatResponses | flat array | [{r, d, c, s, at, sl, di, sc}] |
  | goaling | **dict keyed by rep name** (NOT an array!) | {"Rep Name": {level, ptsGoal, ptsPacingPct, ...}} |
  | lateCancels | dict | {total, byPartner, byMonth, byActivity} |
  | lateCancelRecords | flat array | [{id, num, partner, seller, ...}] |
  | spendByPartner, spendTotal, etc. | individual blocks | embedded separately from vendor_spend.json |

  refresh_all.py validates these shapes before embedding. If validation fails, it aborts without touching dashboard.html.

