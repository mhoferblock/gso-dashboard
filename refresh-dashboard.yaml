  - **Vendor Ops** (channel='vendorops') — 4 reps (Megan Martchink, Kyle Rominger, Jean- Arthur, Meri Fakraufon). Excluded from main GSO KPIs.
  - **GSO** (channel='') — Everyone else. This is what the main dashboard shows.

