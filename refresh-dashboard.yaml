  ERROR RECOVERY
  ═══════════════════════════════════════════════════════════

  If ANY step fails after modifying dashboard.html:
  1. List backups: ls -lt /Users/mhofer/gso-dashboard/.backups/ | head -5
  2. Restore: cp .backups/dashboard_LATEST.html dashboard.html
  3. Re-upload to Blockcell
  4. Report what failed and why

