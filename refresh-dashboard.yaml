title: "Refresh GSO Dashboard"
description: "Incremental refresh — merges 90-day Snowflake delta into local cache, pulls other sources in parallel, validates shapes, embeds, and deploys. ~3 min total."
instructions: |
  You are refreshing the GSO Dashboard. Work in /Users/mhofer/gso-dashboard (the local working copy).
  The main file is **dashboard.html** (NOT index.html — that's just a redirect stub).

  ## CRITICAL RULES
  1. **NEVER deploy without validating numbers.** After embedding, check key KPIs match expected ranges.
  2. **Channel tagging is mandatory.** refresh_all.py handles this automatically. NEVER bypass it.
  3. **Compare before/after.** refresh_all.py does this. If it aborts, DO NOT use --force without Matt's approval.
  4. **Draft DSRs are excluded** from all active metrics (category = 'draft'). Don't count them.
  5. **Rejected DSRs** go to Cancelled tab only. They are NOT "projects worked."
  6. **Pipeline = roster reps only.** Departed reps' active/onHold DSRs are zombies — excluded from pipeline.
  7. Set Snowflake row limit to at least 50000 before running queries.
  8. If ANYTHING fails after modifying dashboard.html, restore from backup immediately.

  ## Data Architecture
  - **dashboard.html** — single-file SPA (~14MB) with all data embedded as GSO_DATA.xxx = {...};
  - **dsr_facts.json** — LOCAL CACHE of all DSR records (~40K+). Persists between refreshes. Never truncated.
  - **Airtable** base appsnfWWzptN9cwD0 — Goaling (tblB0NwaUmNv19B4c), Vendor Spend (tblgVXWTVTO9u1WxX)
  - **Snowflake** — source of truth for DSR, DSA, and BPO Activity records
  - **GetFeedback** — CSAT survey responses
  - **refresh_all.py** — embed script with shape validation, channel tagging, format transforms, before/after comparison

  ## EXPECTED DATA SHAPES — dashboard.html contract
  Getting these wrong = JS crash = stuck at pin screen. refresh_all.py validates before embedding.

