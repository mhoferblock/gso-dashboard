version: "4.0.0"
title: "Refresh GSO Dashboard"
description: "Incremental refresh — merges 90-day Snowflake delta into local cache, pulls other sources in parallel, validates shapes, embeds, and deploys. ~3 min total. v4: fixed BPO keys, LC enrichment, spend normalization, goaling validation."
instructions: |
  You are refreshing the GSO Dashboard. Work in /Users/mhofer/gso-dashboard (the local working copy).
  The main file is **dashboard.html** (NOT index.html — that's just a redirect stub).

  ## CRITICAL RULES
  1. **NEVER deploy without validating numbers.** After embedding, check key KPIs match expected ranges.
  2. **Channel tagging is mandatory.** refresh_all.py handles this automatically. NEVER bypass it.
  3. **Compare before/after.** refresh_all.py does this. If it aborts, DO NOT use --force without Matt's approval.
  4. **Draft DSRs are excluded** from all active metrics (category = 'draft'). Don't count them.
  5. **Rejected DSRs** go to Cancelled tab only. They are NOT "projects worked."
  6. **Pipeline = roster reps only.** Departed reps' active/onHold DSRs are zombies — excluded from pipeline.
  7. Set Snowflake row limit to at least 50000 before running queries.
  8. If ANYTHING fails after modifying dashboard.html, restore from backup immediately.

  ## Data Architecture
  - **dashboard.html** — single-file SPA (~14MB) with all data embedded as GSO_DATA.xxx = {...};
  - **dsr_facts.json** — LOCAL CACHE of all DSR records (~40K+). Persists between refreshes. Never truncated.
  - **Snowflake** — source of truth for DSR, DSA, BPO Activity, and late cancel records
  - **GetFeedback** — CSAT survey responses
  - **refresh_all.py** — embed script with shape validation, channel tagging, BPO slimming (keeps st/sl keys), late cancel enrichment, spend format normalization, goaling validation, and before/after comparison

  Airtable base appsnfWWzptN9cwD0 — used for Goaling (tblB0NwaUmNv19B4c) and Vendor Spend (tblgVXWTVTO9u1WxX), but NOT for routine refreshes (Snowflake is faster).

  ## EXPECTED DATA SHAPES — dashboard.html contract
  Getting these wrong = JS crash = stuck at pin screen. refresh_all.py validates before embedding.

  | Variable | Type | Keys | Notes |
  |---|---|---|---|
  | dsrFacts | **flat array** | i, r, st, ch, cd, cpd, co, g, ... | Slim format built by refresh_all.py |
  | dsaRecords | **flat array** | p, sl, at, st, dr, cd | ⚠️ NOT a wrapper dict! |
  | bpoActivities | **flat array** | at, **st**, cd, dr, **sl**, cpd | ⚠️ MUST include st (status) and sl (seller). refresh_all.py handles this. |
  | csatResponses | **flat array** | r, d, c, s, at, sl, di, sc | |
  | goaling | **dict keyed by rep name** | level, country, ptsGoal, ptsPacingPct, ... | Current quarter. level must be 3 or 4 (NOT 2). country must not be blank. |
  | goalingMeta | dict | quarter, daysElapsed, daysInQuarter, status | status='current' for active quarter |
  | goalingHistory | **dict keyed by quarter** | e.g. "Q1 FY2026": {meta:{...}, reps:{...}} | Past quarters with status='final' |
  | lateCancels | dict | total, **late24h**, **late3d**, **lostHours**, **avgMins**, byPartner: {name: {l,t}}, **byActivity**: {name: {l,t}}, byMonth | ⚠️ refresh_all.py enriches this automatically from late_cancel_records.json |
  | lateCancelRecords | flat array | partner, seller, activityType, scheduledDate, ... | camelCase keys. Normalization IIFE in dashboard.html maps to short keys (sd, p, at). |
  | spendByPartner, spendTotal, etc. | individual blocks | | Embedded separately from vendor_spend.json |
  | spendMonthlyByPartner | dict | **"YYYY-MM\|Partner": amount** | ⚠️ Pipe-delimited keys. refresh_all.py normalizes nested dict format automatically. |
  | forecast | dict | months, actualMonths, regions, forecast[], actuals[] | Static — only updated when capacity model changes |
  | hcPlanning | dict | benchmarks, currentHC, alerts[], top33Reps[] | Static — only updated when forecast or roster changes |

  ## What refresh_all.py Does Automatically
  These were hard-won fixes. The script handles them so you don't have to:
  1. **Channel tagging** — tags BPO/Vendor Ops/GSO based on rep name
  2. **BPO slimming** — keeps st (status) and sl (seller) keys (NOT ow/n)
  3. **Late cancel enrichment** — computes late24h, late3d, lostHours, avgMins, byActivity, and converts byPartner to {l,t} format
  4. **Spend normalization** — converts nested {"YYYY-MM": {"Partner": amt}} to pipe-delimited {"YYYY-MM|Partner": amt}
  5. **Goaling validation** — refuses to embed if all reps have level=2 or blank country (corrupted data)
  6. **Before/after comparison** — aborts if metrics shift too much
  7. **Shape validation** — checks all JSON files match expected formats before touching dashboard

