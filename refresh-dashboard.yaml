  ═══════════════════════════════════════════════════════════
  HOW THE INCREMENTAL REFRESH WORKS
  ═══════════════════════════════════════════════════════════

  dsr_facts.json is a persistent local cache with ALL ~40K+ records going back to 2021.
  Each refresh queries Snowflake for records modified in the last 90 days (~3-5K)
  and merges them into the cache. All history is retained — the cache is never truncated.

  Why 90 days: 915 active DSRs are >90 days old and can get status changes anytime.
  90 days catches virtually all real modifications while pulling ~8x fewer records than a full pull.

  When to do a FULL re-baseline (Step 1-FULL):
  - dsr_facts.json is missing or has <30,000 records
  - Quarterly data hygiene (first refresh of the quarter)
  - Metrics look wrong after an incremental refresh

  ═══════════════════════════════════════════════════════════
