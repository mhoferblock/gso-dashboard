  ═══════════════════════════════════════════════════════════
  ARCHITECTURE: INCREMENTAL REFRESH (v2)
  ═══════════════════════════════════════════════════════════

  The old approach pulled ALL 40K+ records from Airtable every time (~15 min).
  The new approach uses local JSON files as a persistent cache and only pulls
  records modified in the last 14 days (~2 min).

  How it works:
  1. dsr_facts.json is the LOCAL CACHE (~40K records, persists between refreshes)
  2. Query Snowflake for DSRs modified in the last 14 days (~1,000-2,000 records)
  3. Merge Snowflake updates INTO the local cache (upsert by SFDC ID)
  4. Embed the merged cache into dashboard.html
  5. All history is preserved because the cache is never truncated

  When to do a FULL pull (re-baseline):
  - First time setup
  - If dsr_facts.json is missing or corrupted
  - Monthly (first refresh of the month) for data hygiene
  - If metrics look wrong after an incremental refresh

  ═══════════════════════════════════════════════════════════
  STEP 1: Incremental DSR update (Snowflake → local cache)
  ═══════════════════════════════════════════════════════════

  ### 1a. Set Snowflake config
  Set Snowflake limit to 50000 and timeout to 300.

  ### 1b. Check if local cache exists
  If dsr_facts.json exists and has >30,000 records → use INCREMENTAL mode.
  If missing or <30,000 records → use FULL PULL mode (go to Step 1-FULL below).

  ### 1c. Query Snowflake for recently modified DSRs (last 14 days)

  ```sql
  SELECT
    d.ID AS SFDC_ID,
    u.NAME AS REP_NAME,
    d.STATUS_C AS STATUS,
    d.SUB_STATUS_C AS SUB_STATUS,
    d.ACCOUNT_NAME_C AS SELLER,
    d.COUNTRY_CODE_C AS COUNTRY,
    d.CURRENCY_ISO_CODE AS CURRENCY,
    d.TOTAL_ANNUAL_GPV_C AS GPV_ANNUAL,
    d.OPPORTUNITY_OWNER_C AS OPP_OWNER,
    d.OPPORTUNITY_OWNER_ROLE_C AS OPP_OWNER_ROLE,
    TO_VARCHAR(d.CREATED_DATE, 'YYYY-MM-DD') AS CREATED_DATE,
    TO_VARCHAR(d.DATE_COMPLETED_C, 'YYYY-MM-DD') AS COMPLETED_DATE,
    DATEDIFF('day', d.CREATED_DATE, COALESCE(d.DATE_COMPLETED_C, d.DATE_TRANSITIONED_C)) AS DAYS_TO_COMPLETE,
    DATEDIFF('day', d.CREATED_DATE, CURRENT_DATE()) AS DAYS_OPEN,
    DATEDIFF('day', d.LAST_MODIFIED_DATE, CURRENT_DATE()) AS DAYS_STALE,
    d.NUMBER_OF_LOCATIONS_C AS NUM_LOCATIONS,
    d.COMPLEXITY_SCORE_C AS COMPLEXITY_SCORE,
    d.COMPETITOR_POS_C AS COMPETITOR_POS,
    d.MERCHANT_TOKEN_C AS MERCHANT_TOKEN
  FROM FIVETRAN.APP_SALES_SFDC.DEAL_SUPPORT_REQUEST_C d
  LEFT JOIN FIVETRAN.APP_SALES_SFDC."USER" u ON d.OWNER_ID = u.ID
  WHERE d.RECORD_TYPE_NAME_C = 'GSO Global Seller Onboarding'
    AND d.LAST_MODIFIED_DATE >= DATEADD('day', -14, CURRENT_DATE())
  ORDER BY d.LAST_MODIFIED_DATE DESC
  ```

  Expected: 1,000-3,000 records.

  ### 1d. Merge into local cache
  Read dsr_facts.json into memory. Build a lookup by `id` (SFDC ID).
  For each Snowflake record:
    - Map to camelCase keys (same mapping as before — see field mapping below)
    - If id exists in cache → UPDATE the record
    - If id doesn't exist → ADD to cache
  Save merged result back to dsr_facts.json.

  Field mapping (Snowflake → camelCase):
    SFDC_ID → id, REP_NAME → rep, STATUS → status, SUB_STATUS → subStatus,
    SELLER → seller, COUNTRY → country, CURRENCY → currency,
    GPV_ANNUAL → gpvUsd, OPP_OWNER → oppOwner, OPP_OWNER_ROLE → oppOwnerRole,
    CREATED_DATE → createdDate, COMPLETED_DATE → completedDate,
    DAYS_TO_COMPLETE → daysToComplete, DAYS_OPEN → daysOpen, DAYS_STALE → daysStale,
    NUM_LOCATIONS → numLocations, COMPLEXITY_SCORE → complexityScore,
    COMPETITOR_POS → competitorPos, MERCHANT_TOKEN → merchantToken

  **DO NOT overwrite** these Airtable-only fields if they already exist in the cache:
    teamLead, partner, requestReason, workType, goLiveDate, implServicesPrice

  Report: cache size before, records updated, records added, cache size after.

  ### 1-FULL: Full pull from Airtable (only if cache is missing/stale)
  Pull ALL records from Airtable base appsnfWWzptN9cwD0, table tblqfqKMvmdufvRjD.
  Page through all records (100 per page, use offset for pagination).
  Map to camelCase keys. Save as dsr_facts.json.
  Expected: ~40,000-42,000 records, ~10 min.

  ═══════════════════════════════════════════════════════════
  STEP 2: DSA Records (Snowflake)
  ═══════════════════════════════════════════════════════════

  Same query as before. Save as **flat array** to dsa_records.json.
  Also save stats to dsa_stats.json.

  ⚠️ CRITICAL: dsa_records.json must be a FLAT ARRAY [{p, sl, at, st, dr, cd}, ...].
  Do NOT wrap it in {records: [...], stats: ...}. The dashboard iterates it directly.

  ```sql
  SELECT
    pa.NAME as PARTNER, d.CUSTOMER_BUSINESS_NAME_C as SELLER,
    d.ACTIVITY_TYPE_C as ACTIVITY_TYPE, d.STATUS_C as STATUS,
    d.DEAL_SUPPORT_REQUEST_C as DSR_ID,
    TO_VARCHAR(d.CREATED_DATE, 'YYYY-MM-DD') as CREATED_DATE
  FROM FIVETRAN.APP_PARTNERSHIPS.DEAL_SUPPORT_ACTIVITY_C d
  LEFT JOIN FIVETRAN.APP_PARTNERSHIPS.ACCOUNT pa ON d.PARTNER_ACCOUNT_C = pa.ID
  WHERE d.PARTNER_ACCOUNT_C IS NOT NULL
    AND pa.NAME IN ('Absolute POS','Absolute POS LLC','Absolute POS (Vendor)',
      'Boomtown','Ovation (Vendor)','Sora Partners','Sora Partners (Vendor)',
      'Solio Marlow','Solio Marlow (Vendor)','F3 Technologies','F3 (Vendor)',
      'Tech Pantry','Tech Pantry (Vendor)','One World Rental UK','One World Rental UK (Vendor)',
      'One World Rental Oceania (Vendor)','Eposability','Eposability (Vendor)',
      'Akae','Akae (Vendor)','SVO','SVO (Vendor)','Khiron','Khiron (Vendor)',
      'FiTech','Bright')
    AND d.CREATED_DATE >= DATEADD('month', -24, CURRENT_DATE())
  ORDER BY d.CREATED_DATE DESC
  ```

  Normalize partner names (same as before).
  Save FLAT array to dsa_records.json with short keys: p, sl, at, st, dr, cd.
  Save stats to dsa_stats.json: {dsaTotal, dsaByPartner, dsaByActivity, dsaMonthly, dsaNormStatus, dsaPartnerPerf}.

  ═══════════════════════════════════════════════════════════
  STEP 3: BPO Activities (Snowflake → JSON)
  ═══════════════════════════════════════════════════════════

  Query Snowflake for BPO Activities (Record Type = 'BPO Activity', last 12 months).
  Save as bpo_activities.json with structure: {records: [...], summary: {...}}.
  refresh_all.py handles slimming and embedding.

  ```sql
  SELECT
    d.ID AS DSA_ID, d.NAME AS DSA_NUMBER,
    d.ACTIVITY_TYPE_C AS ACTIVITY_TYPE, d.STATUS_C AS STATUS,
    d.DEAL_SUPPORT_REQUEST_C AS DSR_ID, dsr.NAME AS DSR_NAME,
    dsr.ACCOUNT_NAME_C AS SELLER, u.NAME AS ASSIGNED_TO,
    d.CUSTOMER_BUSINESS_NAME_C AS CUSTOMER_NAME,
    TO_VARCHAR(d.CREATED_DATE, 'YYYY-MM-DD') AS CREATED_DATE,
    TO_VARCHAR(d.LAST_MODIFIED_DATE, 'YYYY-MM-DD') AS LAST_MODIFIED,
    TO_VARCHAR(d.COMPLETED_DATE_C, 'YYYY-MM-DD') AS COMPLETED_DATE
  FROM FIVETRAN.APP_PARTNERSHIPS.DEAL_SUPPORT_ACTIVITY_C d
  LEFT JOIN FIVETRAN.APP_SALES_SFDC.DEAL_SUPPORT_REQUEST_C dsr ON d.DEAL_SUPPORT_REQUEST_C = dsr.ID
  LEFT JOIN FIVETRAN.APP_SALES_SFDC."USER" u ON d.OWNER_ID = u.ID
  WHERE d.RECORD_TYPE_ID IN (
    SELECT ID FROM FIVETRAN.APP_PARTNERSHIPS.RECORD_TYPE
    WHERE NAME = 'BPO Activity' OR DEVELOPER_NAME = 'BPO_Activity'
  )
    AND d.CREATED_DATE >= DATEADD('month', -12, CURRENT_DATE())
  ORDER BY d.CREATED_DATE DESC
  ```

  Save with short keys: id, n, at, st, dr, dn, sl, as (assigned), cn, cd, lm, cpd.
  Expected: 10,000-13,000 records.

  ═══════════════════════════════════════════════════════════
  STEP 4: Small data sources (parallel)
  ═══════════════════════════════════════════════════════════

  These are small and fast — run them all in parallel:

  ### 4a. Late Cancellations (Snowflake)
  Query for cancelled DSAs where |LAST_MODIFIED - SCHEDULED| <= 24h, last 12 months.
  Save summary to late_cancels.json, detail to late_cancel_records.json.

  ### 4b. CSAT (GetFeedback API)
  ```bash
  curl -s "https://sc.getfeedback.com/data?token=eJyrViouLSpLrYzPTFGyMjQyMzA3MNdRSsvMKUktUrKqVkpSslJKzEtRAoopWUXH1tYCAIIbDv8.3sL7BRMf74hpIzAX7meFAWjVcwJebrYbG-hosMJMgpQ&limit=500" -o /tmp/csat_raw.json
  ```
  Transform to compact format: {r, d, c, s, at, sl, di, sc}
  Save as csat_data.json.

  ### 4c. Vendor Spend (Airtable)
  Pull from tblgVXWTVTO9u1WxX. Compute stats. Save as vendor_spend.json.

  ### 4d. Goaling (Airtable)
  Pull from tblB0NwaUmNv19B4c.

  ⚠️ CRITICAL: goaling.json must be a DICT keyed by rep name, NOT a raw Airtable array.
  Transform from Airtable format:
    "Rep Name" → dict key
    "DSR Goal" → dsrGoal, "DSR Pacing Goal" → dsrPacingGoal, "DSR Actual" → dsrActual
    "DSR Pacing %" → dsrPacingPct (multiply by 100), "DSR Quarter %" → dsrQuarterPct (multiply by 100)
    "Points Goal" → ptsGoal, "Points Pacing Goal" → ptsPacingGoal, "Points Actual" → ptsActual
    "Points Pacing %" → ptsPacingPct (multiply by 100), "Points Quarter %" → ptsQuarterPct (multiply by 100)
    "Days Goal" → daysGoal, "Status" → status, "Level" → level (default 2), "Country" → country

  Save as goaling.json.
  refresh_all.py will also auto-transform if it detects raw Airtable format, but better to do it here.

  ═══════════════════════════════════════════════════════════
  STEP 5: Embed all data (with validation)
  ═══════════════════════════════════════════════════════════

  ```bash
  cd /Users/mhofer/gso-dashboard
  python3 refresh_all.py
  ```

  This script will:
  1. **Validate data shapes** — checks all JSON files match expected formats BEFORE touching dashboard.html
  2. Create a backup of dashboard.html
  3. Extract current metrics from the embedded data
  4. Apply channel tagging (BPO, Vendor Ops) to dsr_facts.json
  5. Embed all JSON files into dashboard.html
  6. Compare before/after metrics — ABORT if thresholds exceeded
  7. Validate dashboard structure (script tags, data blocks, file size)
  8. Update the "Last refreshed" date in the footer

  **If shape validation fails**, it aborts WITHOUT creating a backup or touching dashboard.html.
  **If metric comparison fails**, it restores from backup automatically.
  **If you need to force**, run: python3 refresh_all.py --force

  ═══════════════════════════════════════════════════════════
  STEP 6: Deploy to Blockcell
  ═══════════════════════════════════════════════════════════

  ```bash
  mkdir -p /tmp/gso-deploy
  cp /Users/mhofer/gso-dashboard/dashboard.html /tmp/gso-deploy/
  cp /Users/mhofer/gso-dashboard/index.html /tmp/gso-deploy/
  ```
  - Use Blockcell manageSite tool: action=upload, site_name=gso-dashboard, directory_path=/tmp/gso-deploy
  - Verify with list_versions that the new version is current
  - Clean up: rm -rf /tmp/gso-deploy

  ═══════════════════════════════════════════════════════════
  STEP 7: Git commit and push
  ═══════════════════════════════════════════════════════════

  ```bash
  cd /Users/mhofer/gso-dashboard
  git add dashboard.html refresh_all.py refresh-dashboard.yaml
  git commit -m "Refresh dashboard data — $(date +%Y-%m-%d)"
  git push
  ```

