version: "1.0.0"
title: "Refresh GSO Dashboard"
description: "Pull latest data from all sources, rebuild dashboard.html, and deploy to Blockcell."
instructions: |
  You are refreshing the GSO Dashboard. Work in /Users/mhofer/gso-dashboard (the local working copy).
  The main file is **dashboard.html** (NOT index.html â€” that's just a redirect stub).

  ## Data Architecture
  - **dashboard.html** â€” single-file SPA with all data embedded as GSO_DATA.xxx = {...};
  - **Airtable** base appsnfWWzptN9cwD0 â€” persistent data store
  - **Snowflake** â€” source of truth for DSR and DSA records
  - **GetFeedback** â€” CSAT survey responses (sluricane API)
  - **refresh_all.py** â€” embed script that replaces data blocks in dashboard.html

  ## IMPORTANT RULES
  - Always work on /Users/mhofer/gso-dashboard/dashboard.html (NOT /tmp, NOT index.html)
  - Create a backup BEFORE modifying: cp dashboard.html .backups/dashboard_$(date +%Y%m%d_%H%M%S).html
  - Validate after embedding â€” check for JS syntax errors before deploying
  - If anything fails, restore from backup immediately
  - Set Snowflake row limit to 50000 before running queries

  ## Step 1: DSR Facts (Snowflake â†’ Airtable â†’ embed)
  This is the largest dataset (~40K records). Do an incremental sync.

  ### 1a. Set Snowflake config
  Set Snowflake limit to 50000 and timeout to 300.

  ### 1b. Query Snowflake for new/modified records
  Check Airtable Sync Log (table tbl4lnLHEmNyqpCjc) for last sync date. Default to 7 days ago.
  
  ```sql
  SELECT
    d.ID, u.NAME AS REP_NAME, d.STATUS_C, d.SUB_STATUS_C,
    d.ACCOUNT_NAME_C, d.PURCHASED_IMPLEMENTATION_SERVICES_C AS WORK_TYPE,
    d.REQUEST_REASON_C, d.COUNTRY_CODE_C, d.CURRENCY_ISO_CODE,
    d.TOTAL_ANNUAL_GPV_C, d.LIFETIME_GPV_C,
    d.OPPORTUNITY_OWNER_C, d.OPPORTUNITY_OWNER_ROLE_C,
    TO_VARCHAR(d.CREATED_DATE, 'YYYY-MM-DD') AS CREATED_DT,
    d.DATE_COMPLETED_C, d.DATE_TRANSITIONED_C,
    DATEDIFF('day', d.CREATED_DATE, COALESCE(d.DATE_COMPLETED_C, d.DATE_TRANSITIONED_C)) AS DAYS_TO_COMPLETE,
    DATEDIFF('day', d.CREATED_DATE, CURRENT_DATE()) AS DAYS_OPEN,
    DATEDIFF('day', d.LAST_MODIFIED_DATE, CURRENT_DATE()) AS DAYS_STALE,
    d.ONSITE_C, d.NUMBER_OF_LOCATIONS_C
  FROM FIVETRAN.APP_SALES_SFDC.DEAL_SUPPORT_REQUEST_C d
  LEFT JOIN FIVETRAN.APP_SALES_SFDC."USER" u ON d.OWNER_ID = u.ID
  WHERE d.RECORD_TYPE_NAME_C = 'GSO Global Seller Onboarding'
    AND d.LAST_MODIFIED_DATE >= '{cutoff_date}'
  ORDER BY d.LAST_MODIFIED_DATE DESC
  ```

  ### 1c. Upsert to Airtable
  For each record, search Airtable DSR Facts (tblqfqKMvmdufvRjD) by filterByFormula `{SFDC ID} = "ID"`.
  If found â†’ update. If not â†’ create. Batch in groups of 10. Use typecast: true.

  Field mapping: IDâ†’SFDC ID, REP_NAMEâ†’Rep, ACCOUNT_NAME_Câ†’Seller, WORK_TYPEâ†’Work Type,
  STATUS_Câ†’Status, SUB_STATUS_Câ†’Sub Status, REQUEST_REASON_Câ†’Request Reason,
  COUNTRY_CODE_Câ†’Country, CURRENCY_ISO_CODEâ†’Currency, TOTAL_ANNUAL_GPV_Câ†’GPV Annual,
  LIFETIME_GPV_Câ†’GPV USD, CREATED_DTâ†’Created Date, DATE_COMPLETED_Câ†’Completed Date,
  DAYS_TO_COMPLETEâ†’Days to Complete, DAYS_OPENâ†’Days Open, DAYS_STALEâ†’Days Stale,
  OPPORTUNITY_OWNER_Câ†’Opp Owner, OPPORTUNITY_OWNER_ROLE_Câ†’Opp Owner Role

  ### 1d. Pull ALL records from Airtable
  Pull all records from DSR Facts (tblqfqKMvmdufvRjD), page through all (100/page).
  Save as /Users/mhofer/gso-dashboard/dsr_facts.json with camelCase keys.
  Classify channel: check Team Roster (tbl0I2oNZdYPlJ5EH) for BPO team membership.

  ## Step 2: DSA Records (Snowflake direct)
  Pull 3P partner DSA activities for the 13 implementation partners.

  ```sql
  SELECT
    pa.NAME as PARTNER, d.CUSTOMER_BUSINESS_NAME_C as SELLER,
    d.ACTIVITY_TYPE_C as ACTIVITY_TYPE, d.STATUS_C as STATUS,
    d.DEAL_SUPPORT_REQUEST_C as DSR_ID,
    TO_VARCHAR(d.CREATED_DATE, 'YYYY-MM-DD') as CREATED_DATE
  FROM FIVETRAN.APP_PARTNERSHIPS.DEAL_SUPPORT_ACTIVITY_C d
  LEFT JOIN FIVETRAN.APP_PARTNERSHIPS.ACCOUNT pa ON d.PARTNER_ACCOUNT_C = pa.ID
  WHERE d.PARTNER_ACCOUNT_C IS NOT NULL
    AND pa.NAME IN ('Absolute POS','Absolute POS LLC','Absolute POS (Vendor)',
      'Boomtown','Ovation (Vendor)','Sora Partners','Sora Partners (Vendor)',
      'Solio Marlow','Solio Marlow (Vendor)','F3 Technologies','F3 (Vendor)',
      'Tech Pantry','Tech Pantry (Vendor)','One World Rental UK','One World Rental UK (Vendor)',
      'One World Rental Oceania (Vendor)','Eposability','Eposability (Vendor)',
      'Akae','Akae (Vendor)','SVO','SVO (Vendor)','Khiron','Khiron (Vendor)',
      'FiTech','Bright')
    AND d.CREATED_DATE >= DATEADD('month', -24, CURRENT_DATE())
  ORDER BY d.CREATED_DATE DESC
  ```

  Normalize partner names (remove " (Vendor)" suffix, map Boomtownâ†’Ovation, etc.).
  Build compact format: {p:partner, sl:seller, at:activity, st:status, dr:dsrId, cd:date}
  Also compute summary stats: dsaTotal, dsaByPartner, dsaByActivity, dsaMonthly, dsaNormStatus, dsaPartnerPerf.
  Save records as /Users/mhofer/gso-dashboard/dsa_records.json

  ## Step 3: Late Cancellations (Snowflake direct)
  Pull cancelled DSAs within 24h of scheduled date â€” see existing query pattern in the codebase.
  Save summary as /Users/mhofer/gso-dashboard/late_cancels.json
  Save detail records as /Users/mhofer/gso-dashboard/late_cancel_records.json

  ## Step 4: CSAT (GetFeedback API)
  ```bash
  curl -s "https://sc.getfeedback.com/data?token=eJyrViouLSpLrYzPTFGyMjQyMzA3MNdRSsvMKUktUrKqVkpSslJKzEtRAoopWUXH1tYCAIIbDv8.3sL7BRMf74hpIzAX7meFAWjVcwJebrYbG-hosMJMgpQ&limit=500" -o /tmp/csat_raw.json
  ```
  Transform to compact format: {r:rating, d:date, c:comment, s:sentiment, at:activity, sl:seller, di:dsaId, sc:contact}
  Save as /Users/mhofer/gso-dashboard/csat_data.json

  ## Step 5: Vendor Spend (Airtable)
  Pull all records from Vendor Spend table (tblgVXWTVTO9u1WxX).
  Compute: spendByPartner, spendInvoicesByPartner, spendMonthly, spendByCurrency, spendTotal, spendInvoiceCount, spendMonthlyByPartner.
  Save as /Users/mhofer/gso-dashboard/vendor_spend.json

  ## Step 6: Goaling (Airtable)
  Pull all records from Goaling table (tblB0NwaUmNv19B4c).
  Save as /Users/mhofer/gso-dashboard/goaling.json

  ## Step 7: Embed all data
  ```bash
  cd /Users/mhofer/gso-dashboard
  python3 refresh_all.py
  ```
  This creates a backup, embeds all JSON files into dashboard.html, validates, and reports.

  ## Step 8: Deploy
  Upload to Blockcell:
  - Use the Blockcell manageSite tool: action=upload, site_name=gso-dashboard, directory_path=/Users/mhofer/gso-dashboard
  - Verify with list_versions that the new version is current

  ## Step 9: Git commit and push
  ```bash
  cd /Users/mhofer/gso-dashboard
  git add dashboard.html dsr_facts.json dsr_facts_slim.json
  git commit -m "Refresh dashboard data â€” $(date +%Y-%m-%d)"
  git push
  ```

  ## Step 10: Log the sync
  Create a record in Airtable Sync Log (tbl4lnLHEmNyqpCjc) with timestamp, record counts, status.

  ## Error Recovery
  If ANY step fails after modifying dashboard.html:
  1. Restore from backup: cp .backups/dashboard_LATEST.html dashboard.html
  2. Re-upload to Blockcell
  3. Report what failed

  ## What NOT to refresh (static/manual data)
  - dispatchPartners â€” partner config, only changes when partners are added/removed
  - dsaStatusMap â€” static status normalization map
  - stratPmMonthly â€” from Looker 41363, updated manually
  - goalingMeta â€” quarter config, updated manually at quarter boundaries

prompt: "Refresh the GSO Dashboard with the latest data from all sources."
