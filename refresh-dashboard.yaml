  ═══════════════════════════════════════════════════════════
  STEP 0: Sync Snowflake → Airtable (new/modified DSRs)
  ═══════════════════════════════════════════════════════════

  This step brings Airtable up to date with Snowflake. Without it, Airtable stays frozen
  at the last sync date and the dashboard shows stale data.

  ### 0a. Set Snowflake config
  Set Snowflake limit to 50000 and timeout to 300.

  ### 0b. Query Snowflake for recently modified records
  Query for all DSRs modified in the last 7 days:

  ```sql
  SELECT
    d.ID AS SFDC_ID,
    u.NAME AS REP_NAME,
    d.STATUS_C AS STATUS,
    d.SUB_STATUS_C AS SUB_STATUS,
    d.ACCOUNT_NAME_C AS SELLER,
    d.PURCHASED_IMPLEMENTATION_SERVICES_C AS WORK_TYPE,
    d.COUNTRY_CODE_C AS COUNTRY,
    d.CURRENCY_ISO_CODE AS CURRENCY,
    d.TOTAL_ANNUAL_GPV_C AS GPV_ANNUAL,
    d.OPPORTUNITY_OWNER_C AS OPP_OWNER,
    d.OPPORTUNITY_OWNER_ROLE_C AS OPP_OWNER_ROLE,
    TO_VARCHAR(d.CREATED_DATE, 'YYYY-MM-DD') AS CREATED_DATE,
    TO_VARCHAR(d.DATE_COMPLETED_C, 'YYYY-MM-DD') AS COMPLETED_DATE,
    DATEDIFF('day', d.CREATED_DATE, COALESCE(d.DATE_COMPLETED_C, d.DATE_TRANSITIONED_C)) AS DAYS_TO_COMPLETE,
    DATEDIFF('day', d.CREATED_DATE, CURRENT_DATE()) AS DAYS_OPEN,
    DATEDIFF('day', d.LAST_MODIFIED_DATE, CURRENT_DATE()) AS DAYS_STALE,
    d.NUMBER_OF_LOCATIONS_C AS NUM_LOCATIONS,
    d.COMPLEXITY_SCORE_C AS COMPLEXITY_SCORE,
    d.COMPETITOR_POS_C AS COMPETITOR_POS,
    d.MERCHANT_TOKEN_C AS MERCHANT_TOKEN
  FROM FIVETRAN.APP_SALES_SFDC.DEAL_SUPPORT_REQUEST_C d
  LEFT JOIN FIVETRAN.APP_SALES_SFDC."USER" u ON d.OWNER_ID = u.ID
  WHERE d.RECORD_TYPE_NAME_C = 'GSO Global Seller Onboarding'
    AND d.LAST_MODIFIED_DATE >= DATEADD('day', -7, CURRENT_DATE())
  ORDER BY d.LAST_MODIFIED_DATE DESC
  ```

  Report: total records found, how many are new (created in last 7 days) vs existing (modified).
  Expected: 300-800 records depending on activity.

  ### 0c. Upsert to Airtable
  For each Snowflake record, search Airtable DSR Facts (tblqfqKMvmdufvRjD) by:
    filterByFormula: {SFDC ID} = "THE_SFDC_ID"

  If found → UPDATE the existing record.
  If not found → CREATE a new record.

  Field mapping (Snowflake → Airtable):
    SFDC_ID → SFDC ID
    REP_NAME → Rep
    STATUS → Status
    SUB_STATUS → Sub Status
    SELLER → Seller
    COUNTRY → Country
    CURRENCY → Currency
    GPV_ANNUAL → GPV Annual
    OPP_OWNER → Opp Owner
    OPP_OWNER_ROLE → Opp Owner Role
    CREATED_DATE → Created Date
    COMPLETED_DATE → Completed Date
    DAYS_TO_COMPLETE → Days to Complete
    DAYS_OPEN → Days Open
    DAYS_STALE → Days Stale
    NUM_LOCATIONS → Num Locations
    COMPLEXITY_SCORE → Complexity Score
    COMPETITOR_POS → Competitor POS
    MERCHANT_TOKEN → Merchant Token

  **DO NOT push these fields** (risk of data corruption):
    - Request Reason (Snowflake values don't match Airtable singleSelect options)
    - Work Type (singleSelect — safer to skip)
    - Team Lead (Airtable-only, manually maintained)
    - Partner (Airtable-only singleSelect)
    - Product Version, Language, Go Live Date, AE Desired Go Live (not in query)

  Process records one at a time (search then update/create).
  Report: total processed, updated count, created count, error count.
  Expected: 0 errors. If errors > 5, STOP and report.

  ═══════════════════════════════════════════════════════════
  STEP 1: Pull DSR Facts from Airtable
  ═══════════════════════════════════════════════════════════

  Pull ALL records from Airtable base appsnfWWzptN9cwD0, table tblqfqKMvmdufvRjD (DSR Facts).
  Page through all records (100 per page, use offset for pagination).

  Fields to extract from each record:
    SFDC ID, Rep, Team Lead, Seller, Work Type, Status, Sub Status,
    Request Reason, Product Version, Country, Currency, GPV Annual, GPV USD,
    Created Date, Completed Date, Go Live Date, Last Modified,
    Days to Complete, Days Open, Days Stale,
    Opp Owner, Opp Owner Role, Num Locations, Competitor POS,
    Merchant Token, Complexity Score, Impl Services Price, Partner

  Save as /Users/mhofer/gso-dashboard/dsr_facts.json as an array of objects with camelCase keys:
    id (from SFDC ID), rep, teamLead, seller, workType, status, subStatus,
    requestReason, country, currency, gpvUsd (from GPV Annual), gpvUsdConverted (from GPV USD),
    createdDate, completedDate, goLiveDate,
    daysToComplete, daysOpen, daysStale,
    oppOwner, oppOwnerRole, numLocations, competitorPos,
    merchantToken, complexityScore, implServicesPrice, partner

  **DO NOT set the channel field manually.** refresh_all.py will compute it from the BPO/Vendor Ops lists.

  After saving, verify:
  - Record count should be ~40,000-42,000
  - Records should have rep, status, createdDate populated for most rows
  - Print status breakdown to confirm data looks reasonable

  ═══════════════════════════════════════════════════════════
  STEP 2: DSA Records (Snowflake)
  ═══════════════════════════════════════════════════════════

  Set Snowflake limit to 50000 and timeout to 300.

  ```sql
  SELECT
    pa.NAME as PARTNER, d.CUSTOMER_BUSINESS_NAME_C as SELLER,
    d.ACTIVITY_TYPE_C as ACTIVITY_TYPE, d.STATUS_C as STATUS,
    d.DEAL_SUPPORT_REQUEST_C as DSR_ID,
    TO_VARCHAR(d.CREATED_DATE, 'YYYY-MM-DD') as CREATED_DATE
  FROM FIVETRAN.APP_PARTNERSHIPS.DEAL_SUPPORT_ACTIVITY_C d
  LEFT JOIN FIVETRAN.APP_PARTNERSHIPS.ACCOUNT pa ON d.PARTNER_ACCOUNT_C = pa.ID
  WHERE d.PARTNER_ACCOUNT_C IS NOT NULL
    AND pa.NAME IN ('Absolute POS','Absolute POS LLC','Absolute POS (Vendor)',
      'Boomtown','Ovation (Vendor)','Sora Partners','Sora Partners (Vendor)',
      'Solio Marlow','Solio Marlow (Vendor)','F3 Technologies','F3 (Vendor)',
      'Tech Pantry','Tech Pantry (Vendor)','One World Rental UK','One World Rental UK (Vendor)',
      'One World Rental Oceania (Vendor)','Eposability','Eposability (Vendor)',
      'Akae','Akae (Vendor)','SVO','SVO (Vendor)','Khiron','Khiron (Vendor)',
      'FiTech','Bright')
    AND d.CREATED_DATE >= DATEADD('month', -24, CURRENT_DATE())
  ORDER BY d.CREATED_DATE DESC
  ```

  Normalize partner names:
  - Absolute POS (Vendor), Absolute POS LLC, APOS → Absolute POS
  - Boomtown, Ovation (Vendor) → Ovation
  - Sora Partners (Vendor), sora partners, SORA PARTNERS → Sora Partners
  - F3 (Vendor), F3 Technologies (Vendor), F3 Tech, F3 → F3 Technologies
  - Solio Marlow (Vendor) → Solio Marlow
  - Tech Pantry (Vendor) → Tech Pantry
  - One World Rental Oceania (Vendor), OneWorld Rental → One World Rental AU
  - One World Rental UK (Vendor), OWR Ltd → One World Rental UK
  - Eposability (Vendor) → Eposability
  - Akae (Vendor), AKAE → Akae
  - SVO (Vendor) → SVO
  - Bright, Khiron (Vendor) → Khiron
  - FiTech → FiTech

  Save as compact JSON to /Users/mhofer/gso-dashboard/dsa_records.json with short keys:
    p=partner, sl=seller, at=activityType, st=status, dr=dsrId, cd=createdDate

  Also compute and embed these summary stats (save in same file or separate):
    dsaTotal, dsaByPartner, dsaByActivity, dsaMonthly, dsaNormStatus, dsaPartnerPerf

  ═══════════════════════════════════════════════════════════
  STEP 2b: BPO Activities (Snowflake → Airtable → JSON)
  ═══════════════════════════════════════════════════════════

  ### 2b-i. Query Snowflake for BPO Activities

  Set Snowflake limit to 50000 and timeout to 300.

  Query for all Deal Support Activities with Record Type = 'BPO Activity':

  ```sql
  SELECT
    d.ID AS DSA_ID,
    d.NAME AS DSA_NUMBER,
    d.ACTIVITY_TYPE_C AS ACTIVITY_TYPE,
    d.STATUS_C AS STATUS,
    d.DEAL_SUPPORT_REQUEST_C AS DSR_ID,
    dsr.NAME AS DSR_NAME,
    dsr.ACCOUNT_NAME_C AS SELLER,
    u.NAME AS ASSIGNED_TO,
    d.CUSTOMER_BUSINESS_NAME_C AS CUSTOMER_NAME,
    TO_VARCHAR(d.CREATED_DATE, 'YYYY-MM-DD') AS CREATED_DATE,
    TO_VARCHAR(d.LAST_MODIFIED_DATE, 'YYYY-MM-DD') AS LAST_MODIFIED,
    TO_VARCHAR(d.COMPLETED_DATE_C, 'YYYY-MM-DD') AS COMPLETED_DATE
  FROM FIVETRAN.APP_PARTNERSHIPS.DEAL_SUPPORT_ACTIVITY_C d
  LEFT JOIN FIVETRAN.APP_SALES_SFDC.DEAL_SUPPORT_REQUEST_C dsr ON d.DEAL_SUPPORT_REQUEST_C = dsr.ID
  LEFT JOIN FIVETRAN.APP_SALES_SFDC."USER" u ON d.OWNER_ID = u.ID
  WHERE d.RECORD_TYPE_ID IN (
    SELECT ID FROM FIVETRAN.APP_PARTNERSHIPS.RECORD_TYPE
    WHERE NAME = 'BPO Activity' OR DEVELOPER_NAME = 'BPO_Activity'
  )
    AND d.CREATED_DATE >= DATEADD('month', -12, CURRENT_DATE())
  ORDER BY d.CREATED_DATE DESC
  ```

  If the RECORD_TYPE subquery doesn't work, try filtering by name pattern:
  ```sql
  WHERE d.RECORD_TYPE_C = 'BPO Activity'
  ```
  Or check available record types first:
  ```sql
  SELECT DISTINCT d.RECORD_TYPE_C, d.RECORD_TYPE_ID
  FROM FIVETRAN.APP_PARTNERSHIPS.DEAL_SUPPORT_ACTIVITY_C d
  LIMIT 100
  ```

  Expected: 500-12,000 records (12 months of BPO activity).

  ### 2b-ii. Upsert to Airtable BPO Activities table

  For each Snowflake record, search Airtable BPO Activities (tbl2jhvPGsV6Akdgv) in base appsnfWWzptN9cwD0 by:
    filterByFormula: {DSA ID} = "THE_DSA_ID"

  If found → UPDATE the existing record.
  If not found → CREATE a new record.

  Field mapping (Snowflake → Airtable):
    DSA_ID → DSA ID
    DSA_NUMBER → Activity Number
    ACTIVITY_TYPE → Activity Type
    STATUS → Status
    DSR_ID → DSR ID
    DSR_NAME → DSR Name
    SELLER → Seller
    ASSIGNED_TO → Assigned To
    CUSTOMER_NAME → Customer Name
    CREATED_DATE → Created Date
    LAST_MODIFIED → Last Modified
    COMPLETED_DATE → Completed Date

  Process records one at a time (search then update/create).
  Report: total processed, updated count, created count, error count.
  Expected: 0 errors. If errors > 5, STOP and report.

  ### 2b-iii. Pull from Airtable → JSON

  Pull ALL records from BPO Activities table (tbl2jhvPGsV6Akdgv) in base appsnfWWzptN9cwD0.
  Page through all records (100 per page, use offset for pagination).

  Save as compact JSON to /Users/mhofer/gso-dashboard/bpo_activities.json with short keys:
    id=DSA ID, n=Activity Number, at=Activity Type, st=Status,
    dr=DSR ID, dn=DSR Name, sl=Seller, as=Assigned To,
    cn=Customer Name, cd=Created Date, lm=Last Modified, cpd=Completed Date

  Report: total records saved.

