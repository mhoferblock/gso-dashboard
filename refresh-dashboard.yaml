  ═══════════════════════════════════════════════════════════
  STEP 0: Setup
  ═══════════════════════════════════════════════════════════

  Set Snowflake config: limit=50000, timeout=300.
  Check dsr_facts.json exists and has >30,000 records.
  If yes → INCREMENTAL mode (Steps 1-4 below).
  If no → FULL PULL mode (Step 1-FULL below, then Steps 2-4).

  ═══════════════════════════════════════════════════════════
  STEP 1: DSR Facts — 90-day incremental merge
  ═══════════════════════════════════════════════════════════
  Run as: **async delegate**

  ### What to do:
  1. Query Snowflake for DSRs modified in the last 90 days:
     ```sql
     SELECT
       d.ID AS SFDC_ID, u.NAME AS REP_NAME,
       d.STATUS_C AS STATUS, d.SUB_STATUS_C AS SUB_STATUS,
       d.ACCOUNT_NAME_C AS SELLER, d.COUNTRY_CODE_C AS COUNTRY,
       d.CURRENCY_ISO_CODE AS CURRENCY, d.TOTAL_ANNUAL_GPV_C AS GPV_ANNUAL,
       d.OPPORTUNITY_OWNER_C AS OPP_OWNER, d.OPPORTUNITY_OWNER_ROLE_C AS OPP_OWNER_ROLE,
       TO_VARCHAR(d.CREATED_DATE, 'YYYY-MM-DD') AS CREATED_DATE,
       TO_VARCHAR(d.DATE_COMPLETED_C, 'YYYY-MM-DD') AS COMPLETED_DATE,
       DATEDIFF('day', d.CREATED_DATE, COALESCE(d.DATE_COMPLETED_C, d.DATE_TRANSITIONED_C)) AS DAYS_TO_COMPLETE,
       DATEDIFF('day', d.CREATED_DATE, CURRENT_DATE()) AS DAYS_OPEN,
       DATEDIFF('day', d.LAST_MODIFIED_DATE, CURRENT_DATE()) AS DAYS_STALE,
       d.NUMBER_OF_LOCATIONS_C AS NUM_LOCATIONS, d.COMPLEXITY_SCORE_C AS COMPLEXITY_SCORE,
       d.COMPETITOR_POS_C AS COMPETITOR_POS, d.MERCHANT_TOKEN_C AS MERCHANT_TOKEN
     FROM FIVETRAN.APP_SALES_SFDC.DEAL_SUPPORT_REQUEST_C d
     LEFT JOIN FIVETRAN.APP_SALES_SFDC."USER" u ON d.OWNER_ID = u.ID
     WHERE d.RECORD_TYPE_NAME_C = 'GSO Global Seller Onboarding'
       AND d.LAST_MODIFIED_DATE >= DATEADD('day', -90, CURRENT_DATE())
     ORDER BY d.LAST_MODIFIED_DATE DESC
     ```
     Expected: 3,000-5,000 records (but can be up to 27K if many bulk updates happened).

  2. Read dsr_facts.json (the local cache, ~40K records).

  3. Build lookup: { id → array_index } from the cache.

  4. For each Snowflake record, map to camelCase and merge into cache:
     SFDC_ID→id, REP_NAME→rep, STATUS→status, SUB_STATUS→subStatus,
     SELLER→seller, COUNTRY→country, CURRENCY→currency, GPV_ANNUAL→gpvUsd,
     OPP_OWNER→oppOwner, OPP_OWNER_ROLE→oppOwnerRole, CREATED_DATE→createdDate,
     COMPLETED_DATE→completedDate, DAYS_TO_COMPLETE→daysToComplete,
     DAYS_OPEN→daysOpen, DAYS_STALE→daysStale, NUM_LOCATIONS→numLocations,
     COMPLEXITY_SCORE→complexityScore, COMPETITOR_POS→competitorPos,
     MERCHANT_TOKEN→merchantToken

     If id exists → UPDATE (but preserve: teamLead, partner, requestReason, workType, goLiveDate, implServicesPrice)
     If id doesn't exist → ADD as new record.

  5. Write merged cache back to dsr_facts.json.

  Report: Snowflake count, cache before, updated, added, cache after.

  ═══════════════════════════════════════════════════════════
  STEP 1-FULL: Full DSR pull from Airtable (only if cache missing)
  ═══════════════════════════════════════════════════════════

  Only use this if dsr_facts.json is missing, corrupted, or has <30K records.

  Pull ALL records from Airtable table tblqfqKMvmdufvRjD in base appsnfWWzptN9cwD0.
  Page through all records (100 per page, use offset). Map to camelCase.
  Save as dsr_facts.json. Expected: ~40K records, ~10 min.

  ═══════════════════════════════════════════════════════════
  STEP 2: DSA Records (Snowflake)
  ═══════════════════════════════════════════════════════════
  Run as: **async delegate** (parallel with Steps 1, 3, 4)

  Query Snowflake for partner DSA records (last 24 months).
  ```sql
  SELECT
    pa.NAME as PARTNER, d.CUSTOMER_BUSINESS_NAME_C as SELLER,
    d.ACTIVITY_TYPE_C as ACTIVITY_TYPE, d.STATUS_C as STATUS,
    d.DEAL_SUPPORT_REQUEST_C as DSR_ID,
    TO_VARCHAR(d.CREATED_DATE, 'YYYY-MM-DD') as CREATED_DATE
  FROM FIVETRAN.APP_PARTNERSHIPS.DEAL_SUPPORT_ACTIVITY_C d
  LEFT JOIN FIVETRAN.APP_PARTNERSHIPS.ACCOUNT pa ON d.PARTNER_ACCOUNT_C = pa.ID
  WHERE d.PARTNER_ACCOUNT_C IS NOT NULL
    AND pa.NAME IN ('Absolute POS','Absolute POS LLC','Absolute POS (Vendor)',
      'Boomtown','Ovation (Vendor)','Sora Partners','Sora Partners (Vendor)',
      'Solio Marlow','Solio Marlow (Vendor)','F3 Technologies','F3 (Vendor)',
      'Tech Pantry','Tech Pantry (Vendor)','One World Rental UK','One World Rental UK (Vendor)',
      'One World Rental Oceania (Vendor)','Eposability','Eposability (Vendor)',
      'Akae','Akae (Vendor)','SVO','SVO (Vendor)','Khiron','Khiron (Vendor)',
      'FiTech','Bright')
    AND d.CREATED_DATE >= DATEADD('month', -24, CURRENT_DATE())
  ORDER BY d.CREATED_DATE DESC
  ```

  Normalize partner names:
  - "Absolute POS (Vendor)", "Absolute POS LLC" → "Absolute POS"
  - "Boomtown", "Ovation (Vendor)" → "Ovation"
  - "Sora Partners (Vendor)" → "Sora Partners"
  - "F3 (Vendor)" → "F3 Technologies"
  - "Solio Marlow (Vendor)" → "Solio Marlow"
  - "Tech Pantry (Vendor)" → "Tech Pantry"
  - "One World Rental Oceania (Vendor)" → "One World Rental AU"
  - "One World Rental UK (Vendor)" → "One World Rental UK"
  - "Eposability (Vendor)" → "Eposability"
  - "Akae (Vendor)" → "Akae"
  - "SVO (Vendor)" → "SVO"
  - "Bright", "Khiron (Vendor)" → "Khiron"

  ⚠️ Save as **FLAT ARRAY** to dsa_records.json: [{p, sl, at, st, dr, cd}, ...]
  Do NOT wrap in {records: [...]}. The dashboard does `for (const r of dsaRecords)`.

  Save stats to dsa_stats.json: {dsaTotal, dsaByPartner, dsaByActivity, dsaMonthly, dsaNormStatus, dsaPartnerPerf}.

  ═══════════════════════════════════════════════════════════
  STEP 3: BPO Activities (Snowflake)
  ═══════════════════════════════════════════════════════════
  Run as: **async delegate** (parallel with Steps 1, 2, 4)

  ```sql
  SELECT
    d.ID AS DSA_ID, d.NAME AS DSA_NUMBER,
    d.ACTIVITY_TYPE_C AS ACTIVITY_TYPE, d.STATUS_C AS STATUS,
    d.DEAL_SUPPORT_REQUEST_C AS DSR_ID, dsr.NAME AS DSR_NAME,
    dsr.ACCOUNT_NAME_C AS SELLER, u.NAME AS ASSIGNED_TO,
    d.CUSTOMER_BUSINESS_NAME_C AS CUSTOMER_NAME,
    TO_VARCHAR(d.CREATED_DATE, 'YYYY-MM-DD') AS CREATED_DATE,
    TO_VARCHAR(d.LAST_MODIFIED_DATE, 'YYYY-MM-DD') AS LAST_MODIFIED,
    TO_VARCHAR(d.COMPLETED_DATE_C, 'YYYY-MM-DD') AS COMPLETED_DATE
  FROM FIVETRAN.APP_PARTNERSHIPS.DEAL_SUPPORT_ACTIVITY_C d
  LEFT JOIN FIVETRAN.APP_SALES_SFDC.DEAL_SUPPORT_REQUEST_C dsr ON d.DEAL_SUPPORT_REQUEST_C = dsr.ID
  LEFT JOIN FIVETRAN.APP_SALES_SFDC."USER" u ON d.OWNER_ID = u.ID
  WHERE d.RECORD_TYPE_ID IN (
    SELECT ID FROM FIVETRAN.APP_PARTNERSHIPS.RECORD_TYPE
    WHERE NAME = 'BPO Activity' OR DEVELOPER_NAME = 'BPO_Activity'
  )
    AND d.CREATED_DATE >= DATEADD('month', -12, CURRENT_DATE())
  ORDER BY d.CREATED_DATE DESC
  ```

  Save to bpo_activities.json as {records: [...], summary: {...}}.
  Short keys: at=ACTIVITY_TYPE, ow=ASSIGNED_TO, cd=CREATED_DATE, n=DSA_NUMBER,
              cpd=COMPLETED_DATE, dr=DSR_ID
  refresh_all.py handles slimming and embedding.
  Expected: 10,000-13,000 records.

  ═══════════════════════════════════════════════════════════
  STEP 4: Small data sources
  ═══════════════════════════════════════════════════════════
  Run as: **single async delegate** that does all 4 (parallel with Steps 1, 2, 3)

  ### 4a. CSAT (GetFeedback API)
  ```bash
  curl -s "https://sc.getfeedback.com/data?token=eJyrViouLSpLrYzPTFGyMjQyMzA3MNdRSsvMKUktUrKqVkpSslJKzEtRAoopWUXH1tYCAIIbDv8.3sL7BRMf74hpIzAX7meFAWjVcwJebrYbG-hosMJMgpQ&limit=500" -o /tmp/csat_raw.json
  ```
  Transform to compact format: {r=rating, d=date, c=comment, s=sentiment, at=activityType, sl=seller, di=dsaId, sc=contact}
  Save as csat_data.json.

  ### 4b. Late Cancellations (Snowflake)
  ```sql
  SELECT
    d.ID AS DSA_ID, d.NAME AS DSA_NUMBER, pa.NAME AS PARTNER,
    d.CUSTOMER_BUSINESS_NAME_C AS SELLER, d.ACTIVITY_TYPE_C AS ACTIVITY_TYPE,
    d.STATUS_C AS STATUS,
    TO_VARCHAR(d.CREATED_DATE, 'YYYY-MM-DD') AS CREATED_DATE,
    TO_VARCHAR(d.LAST_MODIFIED_DATE, 'YYYY-MM-DD') AS MODIFIED_DATE,
    TO_VARCHAR(d.SCHEDULED_DATE_C, 'YYYY-MM-DD') AS SCHEDULED_DATE,
    DATEDIFF('hour', d.LAST_MODIFIED_DATE, d.SCHEDULED_DATE_C) AS HOURS_BEFORE_SCHEDULED
  FROM FIVETRAN.APP_PARTNERSHIPS.DEAL_SUPPORT_ACTIVITY_C d
  LEFT JOIN FIVETRAN.APP_PARTNERSHIPS.ACCOUNT pa ON d.PARTNER_ACCOUNT_C = pa.ID
  WHERE d.STATUS_C IN ('Cancelled', 'Canceled')
    AND d.SCHEDULED_DATE_C IS NOT NULL
    AND ABS(DATEDIFF('hour', d.LAST_MODIFIED_DATE, d.SCHEDULED_DATE_C)) <= 24
    AND d.CREATED_DATE >= DATEADD('month', -12, CURRENT_DATE())
  ORDER BY d.CREATED_DATE DESC
  ```
  Save summary to late_cancels.json: {total, byPartner, byMonth, byActivity, queryNote}
  Save detail to late_cancel_records.json as array.

  ### 4c. Vendor Spend (Airtable)
  Pull all records from tblgVXWTVTO9u1WxX in base appsnfWWzptN9cwD0.
  Compute: spendByPartner, spendInvoicesByPartner, spendMonthly, spendByCurrency,
           spendTotal, spendInvoiceCount, spendMonthlyByPartner
  Save to vendor_spend.json.

  ### 4d. Goaling (Airtable)
  Pull all records from tblB0NwaUmNv19B4c in base appsnfWWzptN9cwD0.

  ⚠️ CRITICAL: Save as **DICT keyed by rep name**, NOT a raw Airtable array.
  The dashboard does `goaling["Takao Kinjo"].ptsPacingPct.toFixed()`.

  Transform:
    "Rep Name" → dict key
    "DSR Goal" → dsrGoal, "DSR Pacing Goal" → dsrPacingGoal, "DSR Actual" → dsrActual
    "DSR Pacing %" → dsrPacingPct (× 100, round 1 decimal)
    "DSR Quarter %" → dsrQuarterPct (× 100, round 1 decimal)
    "Points Goal" → ptsGoal, "Points Pacing Goal" → ptsPacingGoal, "Points Actual" → ptsActual
    "Points Pacing %" → ptsPacingPct (× 100, round 1 decimal)
    "Points Quarter %" → ptsQuarterPct (× 100, round 1 decimal)
    "Days Goal" → daysGoal, "Status" → status
    "Level" → level (default 2), "Country" → country (default "")

  Save as goaling.json.

  ═══════════════════════════════════════════════════════════
  STEP 5: Embed all data
  ═══════════════════════════════════════════════════════════
  Wait for ALL 4 delegates to complete. Then:

  ```bash
  cd /Users/mhofer/gso-dashboard
  python3 refresh_all.py
  ```

  The script:
  1. Validates data shapes (aborts if wrong — dashboard NOT touched)
  2. Backs up dashboard.html
  3. Extracts current metrics for comparison
  4. Applies channel tagging (BPO, Vendor Ops)
  5. Embeds all JSON files
  6. Compares before/after metrics (aborts + restores if thresholds exceeded)
  7. Validates dashboard structure
  8. Updates refresh date

  If it aborts on metric comparison, check if the shift is expected (e.g., start of month = low created/completed counts).
  Use `python3 refresh_all.py --force` only if you understand why metrics shifted.

